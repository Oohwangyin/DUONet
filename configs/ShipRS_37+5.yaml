_BASE_: "./Base-RCNN-FPN.yaml"

MODEL:
  WEIGHTS: "checkpoints/R-50.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 50
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    NAME: "build_resnet_fpn_backbone"
  FPN:
    IN_FEATURES: ["res2", "res3", "res4", "res5"]
  ANCHOR_GENERATOR:
    NAME: "RotatedAnchorGenerator"  # 修改为 RotatedAnchorGenerator
    SIZES: [[32], [64], [128], [256], [512]]
    ASPECT_RATIOS: [[0.1, 0.2, 0.5, 1.0, 2.0, 5.0, 10.0]]
    ANGLES: [[-90., -60., -30., 0., 30., 60., 90.]]  # 添加角度配置
  RPN:
    IN_FEATURES: ["p2", "p3", "p4", "p5", "p6"]
    PRE_NMS_TOPK_TRAIN: 3000
    PRE_NMS_TOPK_TEST: 2000
    POST_NMS_TOPK_TRAIN: 2000
    POST_NMS_TOPK_TEST: 2000
    BBOX_REG_LOSS_TYPE: "smooth_l1"
    BBOX_REG_LOSS_WEIGHT: 1.0
  ROI_HEADS:
     NAME: "RROIHeads"
     BATCH_SIZE_PER_IMAGE: 512
     NUM_CLASSES: 38  # 37 + unknown
     NUM_KNOWN_CLASSES: 37
     NMS_THRESH_TEST: 0.3
     IOU_THRESHOLDS: [0.5]
  ROI_BOX_HEAD:
    NAME: "FastRCNNConvFCHead"
    NUM_FC: 2
    POOLER_RESOLUTION: 7
    POOLER_TYPE: "ROIAlignRotated"
    BBOX_REG_LOSS_TYPE: "smooth_l1"
    BBOX_REG_WEIGHTS: (10., 10., 5., 5., 1.)
  PROPOSAL_GENERATOR:
    NAME: "RRPN"  # 修改为 RRPN
DATASETS:
  TRAIN: ("coco_my_train1234",)
  TEST: ("coco_my_val1234",)
SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.002
  STEPS: (5000, 8500)
  MAX_ITER: 12000
  CHECKPOINT_PERIOD: 500
  WARMUP_ITERS: 200
INPUT:
  MIN_SIZE_TRAIN: (480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800)
  MIN_SIZE_TEST: 800
VERSION: 2
